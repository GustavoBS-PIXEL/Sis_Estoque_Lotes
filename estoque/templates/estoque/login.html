{% extends 'estoque/base.html' %}

{% block content %}
<style>
    /* Pequeno ajuste para os campos padrão do Django ficarem com a cara do Bootstrap */
    .django-form-campos input {
        width: 100%;
        padding: 0.375rem 0.75rem;
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        margin-top: 0.25rem;
    }
</style>

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-primary">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0">Acesso ao Sistema</h4>
            </div>
            <div class="card-body p-4 django-form-campos">
                {% if form.errors %}
                    <div class="alert alert-danger p-2 text-center small">
                        Usuário ou senha incorretos. Tente novamente.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary fw-bold fs-5">Entrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
